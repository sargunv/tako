[settings]
experimental = true
pin = true
minimum_release_age = "3d"
lockfile = true

[tools]
"aqua:dprint/dprint" = "0.55.1"
"aqua:jdx/hk" = "1.49.0"
"core:rust" = { version = "1.96.1", profile = "minimal", components = "rustfmt,clippy" }

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"

[env]
# cxx-qt-build discovers Qt via `qmake` on PATH; pin the major version so the
# Qt6 qmake wins over any lingering Qt5.
QT_VERSION_MAJOR = "6"

[hooks]
postinstall = ["hk install --mise"]
